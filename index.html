<!-- À mettre juste avant </body> -->

<div id="constructionOverlay" class="construction-overlay">
  <div class="glass-card">
    <div class="content-16by9">

      <div class="emoji">🏗️✨</div>
      <h2>Le nouveau DirectPromoteur arrive…</h2>
      
      <p class="teaser">
        Une expérience plus rapide, plus belle, plus intuitive.<br>
        Des projets immobiliers qui vous correspondent vraiment.
      </p>

      <form action="https://formsubmit.co/contact@directpromoteur.tn" method="POST" class="notify-form">
        <input type="hidden" name="_subject" value="Inscription lancement site">
        <input type="hidden" name="_captcha" value="false">

        <input type="email" name="email" placeholder="votre@email.com" required autocomplete="email">
        <button type="submit">Me prévenir du lancement →</button>
      </form>

      <div class="bottom-info">
        <p class="contact-line">
          Nous vous répondrons sur <strong>contact@directpromoteur.tn</strong><br>
          <small>Pas de spam – juste l’essentiel</small>
        </p>

        <div class="social-row">
          <a href="https://www.facebook.com/DirectPromoteur.tn/" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="https://www.instagram.com/directpromoteur.tn/" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://www.linkedin.com/company/directpromoteurtn/" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
          </a>
        </div>

        <p class="address">
          Rue Omar Ibnou Abdelaziz<br>Sousse, Tunisie
        </p>
      </div>

    </div>
  </div>
</div>

<style>
  .construction-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 25, 38, 0.72);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    z-index: 9999;
    display: none;
    place-items: center;
    overflow: auto;
    padding: 20px;
  }

  .construction-overlay.active {
    display: grid;
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow: hidden;
    width: 100%;
    max-width: 860px;
  }

  .content-16by9 {
    aspect-ratio: 16 / 9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 8% 10%;
    text-align: center;
    color: white;
  }

  .emoji {
    font-size: 5.2rem;
    margin-bottom: 1.4rem;
    line-height: 1;
  }

  .glass-card h2 {
    font-size: 2.4rem;
    margin-bottom: 1.1rem;
    font-weight: 700;
  }

  .teaser {
    font-size: 1.18rem;
    opacity: 0.92;
    margin-bottom: 2.4rem;
    max-width: 640px;
  }

  .notify-form {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 12px;
    margin-bottom: 2.4rem;
  }

  .notify-form input {
    flex: 1;
    padding: 16px 20px;
    border: none;
    border-radius: 12px;
    font-size: 1.05rem;
  }

  .notify-form button {
    background: #5C82FD;
    color: white;
    border: none;
    padding: 0 32px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1.05rem;
    cursor: pointer;
    white-space: nowrap;
  }

  .bottom-info {
    margin-top: 1.8rem;
    font-size: 0.98rem;
    opacity: 0.9;
  }

  .contact-line strong {
    color: #a5d0ff;
  }

  .social-row {
    margin: 1.8rem 0;
    display: flex;
    gap: 32px;
    justify-content: center;
  }

  .social-row a {
    color: white;
    font-size: 1.8rem;
    opacity: 0.75;
    transition: 0.2s;
  }

  .social-row a:hover {
    opacity: 1;
    transform: translateY(-2px);
  }

  .address {
    font-size: 0.95rem;
    opacity: 0.8;
  }

  @media (max-width: 780px) {
    .content-16by9 { padding: 10% 8%; }
    .glass-card h2 { font-size: 2rem; }
    .notify-form { flex-direction: column; }
    .notify-form button { padding: 16px; width: 100%; }
  }
</style>

<script>
// Sélectionne TOUS les éléments interactifs que tu veux intercepter
document.addEventListener('click', e => {
  // Cible tous les <a> et <button> (ajuste si tu as d'autres éléments cliquables)
  if (e.target.closest('a, button, [role="button"], .cta, .search-btn, .newsletter button')) {
    // Empêche le comportement par défaut (navigation, submit, etc.)
    e.preventDefault();
    e.stopPropagation();

    // Ouvre l’overlay
    document.getElementById('constructionOverlay').classList.add('active');

    // Option : bloque le scroll du body
    document.body.style.overflow = 'hidden';
  }
}, { capture: true });   // capture: true → intercepte très tôt
</script>
